# SECURITY (read before editing):
# Triggered by `workflow_run` on the "Tests" workflow, so this always runs from
# the BASE branch (develop) with the base-repo token — PR head code is never
# executed here. Do NOT add steps that build, install, or run PR head code.
# PR-controlled values (head branch, author login, etc.) are only ever passed
# through github-script `process.env`, never interpolated into `run:`.

name: CI Triage

on:
  workflow_run:
    workflows: ['Tests']
    types: [completed]

permissions: {}

jobs:
  ask-author:
    name: Ask author to fix failed Tests run
    # Only act on failures. Success is handled by ci-passed-coderabbit.yml.
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # comment + label the PR
      contents: read

    steps:
      - name: Comment and label the PR
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const headSha = process.env.HEAD_SHA;
            const runId = process.env.RUN_ID;

            // Resolve the PR from the head SHA — works for fork PRs, where
            // workflow_run.pull_requests is empty.
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: headSha,
            });
            const pr = prs.find((p) => p.state === 'open');
            if (!pr) {
              core.info(`No open PR associated with ${headSha} — skipping (likely a branch push).`);
              return;
            }

            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${runId}`;

            // Idempotency: don't re-comment if we already flagged this head SHA.
            const marker = `<!-- ci-triage:failure:${headSha} -->`;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });
            if (comments.some((c) => (c.body || '').includes(marker))) {
              core.info(`Already commented on the failure for ${headSha} — skipping.`);
              return;
            }

            const body =
              `${marker}\n` +
              `> This is a templated message\n\n` +
              `Hello @${pr.user.login},\n\n` +
              `The CI **Tests** run on this PR has failed. Could you take a look and push a fix? 🙏\n\n` +
              `- 🔎 Failed run: ${runUrl}\n\n` +
              `Once you've pushed new commits, CI will re-run automatically. Thanks for your contribution! 💜`;

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });

            // Feed the existing community PR lifecycle (waiting on author → stale → close).
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ['waiting on author'],
              });
            } catch (err) {
              core.warning(`Could not add 'waiting on author' label: ${err.message}`);
            }
