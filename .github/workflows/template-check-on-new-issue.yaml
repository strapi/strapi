name: Check Required Checkboxes

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  check-checkboxes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4

      - name: Install and build scripts
        run: cd .github/scripts && npm install && npx tsup issue-template-check.ts --format cjs --target node20 --out-dir dist --no-splitting

      - name: Check issue uses template
        uses: actions/github-script@v7
        with:
          script: |
            const {
              buildInvalidTemplateComment,
              validateIssueTemplate,
            } = require('./.github/scripts/dist/issue-template-check.js');

            const issueBody = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;
            const { valid, missingItems } = validateIssueTemplate(issueBody);

            if (!valid) {
              console.log('Missing required items:', missingItems);

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['flag: invalid template'],
              });

              const comment = buildInvalidTemplateComment(
                context.payload.issue.user.login,
                context.repo.owner,
                context.repo.repo,
                missingItems
              );

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: comment,
              });

              console.log('Added "flag: invalid template" label and comment on issue #' + issueNumber);
            } else {
              console.log('Issue #' + issueNumber + ' follows the bug report template');
            }
