name: Check Required Checkboxes

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  check-checkboxes:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue uses template
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            // Grab every checked checkbox line so we can test it against loose,
            // wording-agnostic keyword sets instead of brittle exact-phrase regexes.
            const checkedBoxLines = issueBody.match(/-\s*\[x\][^\n]*/gi) || [];

            // Define the required checkboxes. A checkbox is considered satisfied when
            // at least one checked line contains ALL of its keywords, regardless of the
            // exact surrounding wording (e.g. singular vs. plural, with or without the
            // markdown link, paraphrased sentences, etc.).
            const requiredCheckboxes = [
              {
                id: 'duplicateCheck',
                text: 'I have checked the existing issues for duplicates.',
                keywords: [/check/i, /duplicate/i]
              },
              {
                id: 'codeOfConduct',
                text: 'I agree to follow this project\'s Code of Conduct.',
                keywords: [/code of conduct/i]
              }
            ];

            // Define required version fields
            const requiredVersionFields = [
              {
                id: 'nodeVersion',
                label: 'Node Version',
                pattern: /### Node Version[\s\S]*?(?=\n### |\n?$)/i
              },
              {
                id: 'pmVersion',
                label: 'Package Manager Version',
                pattern: /### Package Manager Version[\s\S]*?(?=\n### |\n?$)/i
              },
              {
                id: 'strapiVersion',
                label: 'Strapi Version',
                pattern: /### Strapi Version[\s\S]*?(?=\n### |\n?$)/i
              }
            ];

            const missingItems = [];

            // Check each required checkbox
            for (const checkbox of requiredCheckboxes) {
              const found = checkedBoxLines.some((line) =>
                checkbox.keywords.every((keyword) => keyword.test(line))
              );

              if (!found) {
                missingItems.push(checkbox.text);
              }
            }

            // Check each required version field
            for (const field of requiredVersionFields) {
              const match = issueBody.match(field.pattern);
              if (!match) {
                missingItems.push(field.label);
                continue;
              }
              
              // Extract the content between the header and next section
              let content = match[0];
              // Remove the header line
              content = content.replace(/^### .*?\n/i, '');
              // Remove the next section header if present
              content = content.replace(/\n### .*$/i, '');
              
              // Clean up the content
              content = content.trim();
              
              // Check if content is empty or just placeholder text.
              // Note: no minimum length check here — legitimate answers like a bare
              // Node major version ("22", "24", ...) can be as short as 2 characters,
              // so length alone is not a reliable signal of a missing answer.
              if (!content ||
                  content === 'No response' ||
                  content === 'N/A' ||
                  content === 'None') {
                missingItems.push(field.label);
              }
            }

            // If required items are missing, add the label and comment
            if (missingItems.length > 0) {
              console.log('Missing required items:', missingItems);
              
              // Add the "flag: invalid template" label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['flag: invalid template']
              });
              
              // Add a comment explaining what's missing
              const comment = '> This is a templated message\n\n' +
                'Hello @' + context.payload.issue.user.login + ',\n\n' +
                'We ask that you please follow the issue template.\n' +
                'A proper issue submission lets us better understand the origin of your bug and therefore help you. You can see the template guidelines for bug reports [here](.github/ISSUE_TEMPLATE/BUG_REPORT.yml).\n\n' +
                'Please create a new issue and completely fill out the issue template, you can open a new issue [here](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/issues/new).\n\n' +
                'Thank you.';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: comment
              });
              
              console.log('Added "flag: invalid template" label, and comment on issue #' + issueNumber);
                          } else {
              console.log('Added "flag: invalid template" label and comment on issue #' + issueNumber);
            }
