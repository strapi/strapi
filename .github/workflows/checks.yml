name: 'Checks'

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - milestoned
      - demilestoned
    branches:
      - main
      - develop
      - v4

permissions:
  contents: read
  pull-requests: read

jobs:
  check-pr-status:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/pinned/checkout
      - uses: ./.github/actions/check-pr-status

  security-lockfile-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/pinned/checkout
      - uses: ./.github/actions/pinned/setup-node
        with:
          node-version: 24
      - uses: ./.github/actions/security/lockfile
        with:
          allowedHosts: 'yarn'

  check-package-versions:
    name: Package version alignment
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/pinned/checkout
      - uses: ./.github/actions/pinned/setup-node
        with:
          node-version: 24
      - name: Install dependencies
        uses: ./.github/actions/yarn-nm-install
      - name: Check package versions
        run: yarn version:check
