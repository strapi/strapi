name: 'Run API tests'
description: 'Run api tests'
inputs:
  dbOptions:
    description: 'Database options'
    required: true
  runEE:
    description: 'Should run EE or CE tests'
  jestOptions:
    description: 'Jest options'
  perfArtifacts:
    description: 'When true, pass --perf-artifacts to yarn test:api (NDJSON under artifacts/api-perf)'
    default: 'false'
  perfArtifactSuffix:
    description: 'Unique filename fragment for the perf NDJSON file (use per matrix cell in CI)'
    default: ''
runs:
  using: 'composite'
  steps:
    - run: $GITHUB_ACTION_PATH/script.sh
      env:
        DB_OPTIONS: ${{ inputs.dbOptions }}
        RUN_EE: ${{ inputs.runEE }}
        JEST_OPTIONS: ${{ inputs.jestOptions }}
        RUN_PERF_ARTIFACTS: ${{ inputs.perfArtifacts == 'true' && '1' || '' }}
        PERF_ARTIFACT_SUFFIX: ${{ inputs.perfArtifactSuffix }}
      shell: bash
