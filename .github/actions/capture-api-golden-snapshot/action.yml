name: 'Capture API test golden snapshot'
description: 'Generate the API test app and capture the golden snapshot for CI shard jobs'
inputs:
  dbOptions:
    description: 'Database options passed to test:generate-app'
    required: true
  runEE:
    description: 'Enable EE for golden capture (set when STRAPI_LICENSE is available)'
    required: false
runs:
  using: 'composite'
  steps:
    - run: $GITHUB_ACTION_PATH/script.sh
      env:
        DB_OPTIONS: ${{ inputs.dbOptions }}
        RUN_EE: ${{ inputs.runEE }}
      shell: bash
