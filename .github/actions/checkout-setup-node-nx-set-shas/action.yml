# Pinned third-party actions — bump SHAs here when upgrading (see also checkout-setup-node).
name: 'Checkout, Node, and nx-set-shas'
description: >-
  Full git history, Node, and nrwl/nx-set-shas with pinned refs for nx affected jobs.
inputs:
  node-version:
    description: 'Node version for actions/setup-node'
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: ${{ inputs.node-version }}

    - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
